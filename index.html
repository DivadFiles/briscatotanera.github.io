<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Brisca Totanera - Horizontal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }
    
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: linear-gradient(135deg, #0b6623, #1a7b3a);
      color: #fff;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* MENÚ INICIAL */
    #menu-inicio {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    #menu-inicio h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin-bottom: 30px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
    }

    #input-nombre {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      width: min(90%, 400px);
      max-width: 400px;
      margin-bottom: 20px;
      text-align: center;
      background: rgba(255,255,255,0.95);
      color: #333;
    }

    #btn-jugar {
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      padding: 18px 40px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ffcc00, #ffdd44);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }

    #btn-jugar:hover, #btn-jugar:active {
      background: linear-gradient(45deg, #ffdd44, #ffcc00);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* JUEGO HORIZONTAL */
    #juego {
      display: none;
      min-height: 100vh;
      padding: 15px;
      position: relative;
      overflow-x: auto;
    }

    #header-juego {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    #nombre-jugador {
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: bold;
    }

    #btn-fullscreen {
      background: #ffcc00;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }

    #puntuacion {
      text-align: center;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      margin-bottom: 20px;
      font-weight: bold;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    /* MESA HORIZONTAL - CAMBIO PRINCIPAL */
    #mesa {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 300px;
      padding: 20px;
      max-width: 100%;
      overflow-x: auto;
    }

    .zona {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      min-width: 120px;
      flex: 1;
      max-width: 180px;
    }

    .zona-mano {
      display: flex;
      flex-direction: row;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 400px;
    }

    .carta, .carta-mazo, .carta-triunfo {
      /* Cartas optimizadas para horizontal */
      width: clamp(70px, 12vw, 100px);
      height: clamp(100px, 17vw, 140px);
      border-radius: 12px;
      border: 3px solid #fff;
      background-color: #f8f0c6;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .carta:hover, .carta:active {
      transform: scale(1.08) translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
      z-index: 10;
    }

    .carta.desactivada {
      opacity: 0.6;
      cursor: default;
      transform: none !important;
    }

    .carta img,
    .carta-triunfo img,
    .carta-mazo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carta-mazo {
      background-color: #004b23;
      cursor: default;
    }

    .carta-triunfo {
      background-color: #f8f0c6;
      cursor: default;
      transform: rotate(90deg);
      width: clamp(60px, 10vw, 85px);
      height: clamp(85px, 14vw, 120px);
    }

    #info {
      margin-top: 20px;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      font-size: clamp(1.1rem, 3.5vw, 1.3rem);
      min-height: 60px;
    }

    #controles {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ffcc00, #ffdd44);
      color: #000;
      font-weight: bold;
      font-size: clamp(1rem, 3vw, 1.2rem);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.3s;
      min-width: 140px;
    }

    button:hover, button:active {
      background: linear-gradient(45deg, #ffdd44, #ffcc00);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      #mesa {
        gap: 15px;
        padding: 15px;
      }
      
      .zona {
        min-width: 100px;
        gap: 10px;
      }
      
      .zona-mano {
        gap: 5px;
        max-width: 300px;
      }
      
      .carta {
        width: clamp(60px, 14vw, 85px);
        height: clamp(85px, 20vw, 120px);
      }
    }

    @media (max-height: 500px) {
      #mesa {
        min-height: 250px;
      }
      
      .carta {
        width: clamp(55px, 11vw, 80px);
        height: clamp(75px, 15vw, 110px);
      }
    }

    @media (orientation: landscape) {
      #juego {
        padding: 10px;
      }
      
      #mesa {
        justify-content: space-around;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- MENÚ INICIAL -->
  <div id="menu-inicio">
    <h1>🂱 BRISCA TOTANERA 🂱</h1>
    <input type="text" id="input-nombre" placeholder="Tu nombre..." maxlength="15" value="Jugador">
    <button id="btn-jugar">¡JUGAR!</button>
  </div>

  <!-- JUEGO HORIZONTAL -->
  <div id="juego">
    <div id="header-juego">
      <div id="nombre-jugador">Jugador</div>
      <button id="btn-fullscreen">📱 Pantalla completa</button>
    </div>

    <div id="controles">
      <button id="btn-nuevo">Nueva partida</button>
    </div>

    <div id="puntuacion">
      <span id="nombre-jugador-puntos"></span> (<span id="pts-jugador">0</span> pts) | 
      Máquina (<span id="pts-maquina">0</span> pts)
    </div>

    <div id="mesa">
      <!-- Mano máquina (arriba) -->
      <div class="zona">
        <div>🤖</div>
        <div class="zona-mano" id="zona-maquina">
          <div id="mano-maquina"></div>
        </div>
      </div>

      <!-- BAZA CENTRAL -->
      <div class="zona">
        <div>📋 BAZA</div>
        <div id="zona-baza" style="flex-direction: column; gap: 15px;">
          <div id="carta-maquina-baza" class="carta"></div>
          <div id="carta-jugador-baza" class="carta"></div>
        </div>
      </div>

      <!-- MAZO Y TRIUNFO (centro-derecha) -->
      <div class="zona">
        <div>🂠</div>
        <div id="zona-mazo" style="gap: 10px;">
          <div id="mazo" class="carta-mazo"></div>
          <div id="triunfo" class="carta-triunfo"></div>
          <div id="cartas-restantes"></div>
        </div>
      </div>

      <!-- Mano jugador (abajo) -->
      <div class="zona">
        <div>👤</div>
        <div class="zona-mano" id="zona-jugador">
          <div id="mano-jugador"></div>
        </div>
      </div>
    </div>

    <div id="info">¡Bienvenido! Escribe tu nombre y juega en HORIZONTAL</div>
  </div>

  <script>
    // El JavaScript permanece exactamente igual - solo cambió el CSS
    const PALOS = ["Oros", "Copas", "Espadas", "Bastos"];
    const NUMEROS = [1,2,3,4,5,6,7,10,11,12];

    let nombreJugador = "Jugador";
    let mazo = [];
    let triunfo = null;
    let cartasRestantes = 0;
    let manoJugador = [];
    let manoMaquina = [];
    let cartaMesaJugador = null;
    let cartaMesaMaquina = null;
    let puntosJugador = 0;
    let puntosMaquina = 0;
    let turno = "jugador";
    let bazaEnCurso = false;
    let partidaTerminada = false;

    // Elementos DOM
    const menuInicio = document.getElementById("menu-inicio");
    const juegoDiv = document.getElementById("juego");
    const inputNombre = document.getElementById("input-nombre");
    const btnJugar = document.getElementById("btn-jugar");
    const nombreJugadorSpan = document.getElementById("nombre-jugador");
    const nombreJugadorPuntosSpan = document.getElementById("nombre-jugador-puntos");
    const ptsJugadorSpan = document.getElementById("pts-jugador");
    const ptsMaquinaSpan = document.getElementById("pts-maquina");
    const manoJugadorDiv = document.getElementById("mano-jugador");
    const manoMaquinaDiv = document.getElementById("mano-maquina");
    const cartaJugadorBazaDiv = document.getElementById("carta-jugador-baza");
    const cartaMaquinaBazaDiv = document.getElementById("carta-maquina-baza");
    const infoDiv = document.getElementById("info");
    const btnNuevo = document.getElementById("btn-nuevo");
    const btnFullscreen = document.getElementById("btn-fullscreen");

    // EVENTOS TOUCH + CLICK
    function addTouchClick(element, callback) {
      element.addEventListener('click', callback);
      element.addEventListener('touchstart', (e) => {
        e.preventDefault();
        callback(e);
      });
    }

    // Resto del JavaScript es idéntico al original...
    addTouchClick(btnJugar, () => {
      nombreJugador = inputNombre.value.trim() || "Jugador";
      if (nombreJugador.length > 15) nombreJugador = nombreJugador.substring(0,15);
      
      nombreJugadorSpan.textContent = nombreJugador;
      nombreJugadorPuntosSpan.textContent = nombreJugador;
      
      menuInicio.style.display = "none";
      juegoDiv.style.display = "block";
      nuevaPartida();
    });

    addTouchClick(btnNuevo, nuevaPartida);
    addTouchClick(btnFullscreen, toggleFullscreen);

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    function valorPuntos(num) {
      if (num === 1) return 11;
      if (num === 3) return 10;
      if (num === 12) return 4;
      if (num === 11) return 3;
      if (num === 10) return 2;
      return 0;
    }

    function valorFuerza(num) {
      const orden = [1,3,12,11,10,7,6,5,4,2];
      return orden.indexOf(num);
    }

    function crearBaraja() {
      const baraja = [];
      for (const palo of PALOS) {
        for (const num of NUMEROS) {
          baraja.push({ num, palo, puntos: valorPuntos(num) });
        }
      }
      return baraja;
    }

    function barajar(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function nombreArchivoPalo(palo) {
      if (palo === "Oros") return "pencas";
      if (palo === "Copas") return "pechos";
      if (palo === "Espadas") return "jamones";
      if (palo === "Bastos") return "bellotas";
      return palo.toLowerCase();
    }

    function rutaImagenCarta(carta) {
      const nombrePalo = nombreArchivoPalo(carta.palo);
      return `img/${carta.num} de ${nombrePalo}.png`;
    }

    function rutaImagenReverso() {
      return "img/back.png";
    }

    function nuevaPartida() {
      mazo = barajar(crearBaraja());
      puntosJugador = 0;
      puntosMaquina = 0;
      ptsJugadorSpan.textContent = puntosJugador;
      ptsMaquinaSpan.textContent = puntosMaquina;

      manoJugador = [];
      manoMaquina = [];
      for (let i = 0; i < 3; i++) {
        manoJugador.push(mazo.pop());
        manoMaquina.push(mazo.pop());
      }

      triunfo = mazo.pop();
      cartasRestantes = mazo.length;
      cartaMesaJugador = null;
      cartaMesaMaquina = null;
      bazaEnCurso = false;
      partidaTerminada = false;

      turno = "jugador";
      mostrarTriunfo();
      actualizarCartasRestantes();
      render();
      mostrarMensaje(`${nombreJugador}, ¡nueva partida horizontal! Tú empiezas.`);
    }

    function mostrarTriunfo() {
      const triunfoDiv = document.getElementById("triunfo");
      triunfoDiv.innerHTML = "";
      if (!triunfo) {
        triunfoDiv.textContent = "Sin triunfo";
        return;
      }
      const img = document.createElement("img");
      img.src = rutaImagenCarta(triunfo);
      img.alt = `Triunfo ${triunfo.num} de ${triunfo.palo}`;
      triunfoDiv.appendChild(img);
    }

    function actualizarCartasRestantes() {
      document.getElementById("cartas-restantes").textContent = `Mazo: ${cartasRestantes}`;
      const mazoDiv = document.getElementById("mazo");
      mazoDiv.innerHTML = "";
      const img = document.createElement("img");
      img.src = rutaImagenReverso();
      img.alt = "Mazo";
      mazoDiv.appendChild(img);
      if (cartasRestantes === 0) {
        mazoDiv.style.opacity = "0.3";
      } else {
        mazoDiv.style.opacity = "1";
      }
    }

    function nombreNumero(num) {
      if (num === 1) return "As";
      if (num === 10) return "Sota";
      if (num === 11) return "Caballo";
      if (num === 12) return "Rey";
      return String(num);
    }

    function render() {
      manoJugadorDiv.innerHTML = "";
      manoJugador.forEach((carta, index) => {
        const c = document.createElement("div");
        c.className = "carta";
        const img = document.createElement("img");
        img.src = rutaImagenCarta(carta);
        img.alt = `${nombreNumero(carta.num)} de ${carta.palo}`;
        c.appendChild(img);

        if (turno === "jugador" && !bazaEnCurso && !partidaTerminada) {
          addTouchClick(c, () => jugarCartaJugador(index));
        } else {
          c.classList.add("desactivada");
        }
        manoJugadorDiv.appendChild(c);
      });

      manoMaquinaDiv.innerHTML = "";
      manoMaquina.forEach(() => {
        const c = document.createElement("div");
        c.className = "carta-mazo";
        const img = document.createElement("img");
        img.src = rutaImagenReverso();
        img.alt = "Carta CPU";
        c.appendChild(img);
        manoMaquinaDiv.appendChild(c);
      });

      if (cartaMesaJugador) {
        cartaJugadorBazaDiv.style.visibility = "visible";
        cartaJugadorBazaDiv.innerHTML = "";
        const img = document.createElement("img");
        img.src = rutaImagenCarta(cartaMesaJugador);
        img.alt = `${nombreNumero(cartaMesaJugador.num)} de ${cartaMesaJugador.palo}`;
        cartaJugadorBazaDiv.appendChild(img);
      } else {
        cartaJugadorBazaDiv.style.visibility = "hidden";
      }

      if (cartaMesaMaquina) {
        cartaMaquinaBazaDiv.style.visibility = "visible";
        cartaMaquinaBazaDiv.innerHTML = "";
        const img = document.createElement("img");
        img.src = rutaImagenCarta(cartaMesaMaquina);
        img.alt = `${nombreNumero(cartaMesaMaquina.num)} de ${cartaMesaMaquina.palo}`;
        cartaMaquinaBazaDiv.appendChild(img);
      } else {
        cartaMaquinaBazaDiv.style.visibility = "hidden";
      }

      ptsJugadorSpan.textContent = puntosJugador;
      ptsMaquinaSpan.textContent = puntosMaquina;
    }

    function mostrarMensaje(msg) {
      infoDiv.textContent = msg;
    }

    function jugarCartaJugador(indice) {
      if (turno !== "jugador" || bazaEnCurso || partidaTerminada) return;

      cartaMesaJugador = manoJugador.splice(indice, 1)[0];
      bazaEnCurso = true;
      render();
      mostrarMensaje(`${nombreJugador} juega ${nombreNumero(cartaMesaJugador.num)} de ${cartaMesaJugador.palo}.`);

      setTimeout(() => {
        jugarCartaMaquina();
      }, 800);
    }

    function jugarCartaMaquina() {
      if (partidaTerminada) return;
      const indice = Math.floor(Math.random() * manoMaquina.length);
      cartaMesaMaquina = manoMaquina.splice(indice, 1)[0];
      render();
      mostrarMensaje(`Máquina juega ${nombreNumero(cartaMesaMaquina.num)} de ${cartaMesaMaquina.palo}.`);

      setTimeout(() => {
        resolverBaza();
      }, 800);
    }

    function esTriunfo(carta) {
      return triunfo && carta.palo === triunfo.palo;
    }

    function ganaCarta(c1, c2, paloSalida) {
      const c1EsTriunfo = esTriunfo(c1);
      const c2EsTriunfo = esTriunfo(c2);

      if (c1EsTriunfo && !c2EsTriunfo) return true;
      if (!c1EsTriunfo && c2EsTriunfo) return false;

      if (c1.palo === paloSalida && c2.palo !== paloSalida) return true;
      if (c1.palo !== paloSalida && c2.palo === paloSalida) return false;

      return valorFuerza(c1.num) < valorFuerza(c2.num);
    }

    function resolverBaza() {
      const paloSalida = cartaMesaJugador.palo;
      const puntosBaza = cartaMesaJugador.puntos + cartaMesaMaquina.puntos;

      let ganaJugador = ganaCarta(cartaMesaJugador, cartaMesaMaquina, paloSalida);

      if (ganaJugador) {
        puntosJugador += puntosBaza;
        mostrarMensaje(`${nombreJugador} gana la baza (+${puntosBaza} pts)`);
        turno = "jugador";
      } else {
        puntosMaquina += puntosBaza;
        mostrarMensaje(`Máquina gana la baza (+${puntosBaza} pts)`);
        turno = "maquina";
      }

      if (cartasRestantes > 0) {
        if (ganaJugador) {
          manoJugador.push(mazo.pop());
          cartasRestantes--;
          if (cartasRestantes > 0) {
            manoMaquina.push(mazo.pop());
            cartasRestantes--;
          } else if (triunfo) {
            manoMaquina.push(triunfo);
            triunfo = null;
          }
        } else {
          manoMaquina.push(mazo.pop());
          cartasRestantes--;
          if (cartasRestantes > 0) {
            manoJugador.push(mazo.pop());
            cartasRestantes--;
          } else if (triunfo) {
            manoJugador.push(triunfo);
            triunfo = null;
          }
        }
      } else if (triunfo) {
        if (ganaJugador) {
          manoJugador.push(triunfo);
        } else {
          manoMaquina.push(triunfo);
        }
        triunfo = null;
      }

      cartaMesaJugador = null;
      cartaMesaMaquina = null;
      bazaEnCurso = false;
      mostrarTriunfo();
      actualizarCartasRestantes();
      render();

      if (manoJugador.length === 0 && manoMaquina.length === 0 && cartasRestantes === 0 && !triunfo) {
        partidaTerminada = true;
        let resultado = "";
        if (puntosJugador > puntosMaquina) {
          resultado = `🎉 ${nombreJugador} GANA! 🎉`;
        } else if (puntosJugador < puntosMaquina) {
          resultado = "😢 Máquina gana";
        } else {
          resultado = "🤝 EMPATE";
        }
        mostrarMensaje(`¡Partida terminada! ${nombreJugador}: ${puntosJugador} | Máquina: ${puntosMaquina} ${resultado}`);
      }
    }

    inputNombre.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') btnJugar.click();
    });
  </script>
</body>
</html>
