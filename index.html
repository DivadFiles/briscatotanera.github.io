<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Brisca Totanera</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>Brisca Totanera</h1>

    <div id="info">
      <div>Triunfo: <span id="triunfo-text"></span></div>
      <div>Puntos Jugador: <span id="puntos-jugador">0</span></div>
      <div>Puntos IA: <span id="puntos-ia">0</span></div>
      <div id="mensaje"></div>
    </div>

    <div id="mesa">
      <div class="zona-mesa">
        <h2>IA</h2>
        <div id="carta-ia" class="carta-mesa"></div>
      </div>
      <div class="zona-mazo">
        <div id="mazo" class="carta-reverso"></div>
        <div>
          <span>Carta de triunfo:</span>
          <div id="carta-triunfo" class="carta-mesa"></div>
        </div>
      </div>
      <div class="zona-mesa">
        <h2>Jugador</h2>
        <div id="carta-jugador" class="carta-mesa"></div>
      </div>
    </div>

    <h2>Tu mano</h2>
    <div id="mano-jugador"></div>

    <button id="btn-nueva">Nueva partida</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
